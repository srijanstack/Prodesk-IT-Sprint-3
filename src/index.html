<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Git api module</title>
    <style>
      * {
        font-family: sans-serif;
      }

      .bg-backblue {
        background-color: #0f1728;
      }

      .bg-card {
        background-color: #131f38;
      }
      .dataLoaded {
        display: none;
      }
    </style>
  </head>

  <body>
    <nav
      class="h-24 border-b bg-backblue flex items-end p-4 justify-center gap-10 sm:gap-[100px] md:gap-[300px]"
    >
      <h1 class="text-2xl font-semibold text-white">Dev detective</h1>
      <div
        class="h-15 border border-gray-500 rounded-2xl flex items-center justify-center gap-5 p-2"
      >
        <i
          class="fa-solid fa-magnifying-glass text-white text-xl cursor-pointer"
          title="Search"
          id="searchBtn"
        ></i>
        <input
          type="text"
          class="w-[100px] md:w-[250px] h-8 bg-backblue text-gray-200 rounded-xl p-2"
          placeholder="Enter Username"
          id="userInput"
        />
      </div>
    </nav>
    <main
      class="min-h-screen bg-backblue flex flex-col gap-5 items-center justify-center p-10"
    >
      <div>
        <section class="text-center mb-10 max-w-4xl" id="enterUsr">
          <h1
            class="text-4xl md:text-6xl font-extrabold text-white leading-tight mb-4"
          >
            Discover, Analyze, and
            <span class="text-purple-500"> Battle GitHub Profiles </span>
          </h1>

          <p
            class="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto leading-relaxed"
          >
            Explore any developer's GitHub profile, inspect their latest
            repositories, and compare two developers head-to-head based on their
            open-source impact.
          </p>
        </section>

        <h1
          class="text-white font-semibold text-2xl mb-4 hidden"
          id="resultHeader"
        ></h1>
        <div
          class="h-full w-full text-white flex items-center justify-center m-20 ml-0 hidden"
          id="loader"
        >
          <i class="fa-solid fa-circle-notch animate-spin text-[4rem]"></i>
        </div>
        <div
          class="h-auto md:w-[750px] rounded-2xl border flex flex-col md:flex-row hidden items-center p-8 gap-8 bg-card"
          id="userCard"
        ></div>
      </div>
      <div>
        <h1
          class="text-white font-semibold text-2xl mb-4 hidden"
          id="latestRepoHead"
        ></h1>
        <div
          class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-4"
          id="repoContainer"
        ></div>
      </div>
      <h1
        class="text-2xl md:text-4xl font-extrabold text-white leading-tight mb-6"
      >
        Compare Developers.
        <br />
        <span
          class="text-purple-500"
        >
          Let the Stars Decide.
        </span>
      </h1>
      <button
        class="p-4 text-2xl font-semibold text-white bg-purple-800 rounded-2xl hover:scale-105 transition duration-300"
        id="battleModeBtn"
      >
        Enter Battle Mode
      </button>

      <div
        id="battleMode"
        class="hidden w-full max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-center gap-8 mt-10"
      >
        <div class="w-full max-w-sm">
          <div class="flex gap-2 mb-4">
            <input
              type="text"
              id="playerOneInput"
              placeholder="Enter GitHub username"
              class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div
            id="player-1"
            class="bg-card border border-slate-700 rounded-2xl p-6 hidden shadow-xl min-w-[300px]"
          ></div>
        </div>

        <div class="w-full lg:w-auto flex justify-center lg:pt-12">
          <button
            id="battleBtn"
            class="px-6 py-4 text-2xl font-bold text-white rounded-2xl shadow-lg hover:scale-105 transition bg-orange-400 duration-300"
          >
            Battle
          </button>
        </div>

        <div class="w-full max-w-sm">
          <div class="flex gap-2 mb-4">
            <input
              type="text"
              id="playerTwoInput"
              placeholder="Enter GitHub username"
              class="w-full px-4 py-3 rounded-xl bg-slate-900 border border-slate-700 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div
            id="player-2"
            class="bg-card border border-slate-700 rounded-2xl p-6 shadow-xl hidden min-w-[300px]"
          ></div>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
