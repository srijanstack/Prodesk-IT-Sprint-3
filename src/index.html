<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Git api module</title>
    <style>
      * {
        font-family: sans-serif;
      }

      .descrip span {
        color: white;
        font-weight: 600;
      }

      .bg-backblue {
        background-color: #0f1728;
      }

      .bg-card {
        background-color: #131f38;
      }
      .dataLoaded {
        display: none;
      }
    </style>
  </head>

  <body>
    <nav
      class="h-24 border-b bg-backblue flex items-end p-4 justify-center gap-[300px]"
    >
      <h1 class="text-2xl font-semibold text-white">Dev detective</h1>
      <div
        class="w-80 h-15 border border-gray-500 rounded-2xl flex items-center justify-center gap-5 p-2"
      >
        <i
          class="fa-solid fa-magnifying-glass text-white text-xl cursor-pointer"
          title="Search"
          id="searchBtn"
        ></i>
        <input
          type="text"
          class="w-[250px] h-8 bg-backblue text-gray-200 rounded-xl p-2"
          placeholder="Enter Username"
          id="userInput"
        />
      </div>
    </nav>
    <main
      class="min-h-[500px] bg-backblue flex flex-col gap-5 items-center justify-center p-10"
    >
      <div>
        <h1 class="text-white font-semibold text-4xl mb-4" id="enterUsr">Enter a Username</h1>

        <h1
          class="text-white font-semibold text-2xl mb-4 hidden"
          id="resultHeader"
        >
          Result for srijanstack
        </h1>
        <div
          class="h-full w-full text-white flex items-center justify-center m-20 ml-0 hidden"
          id="loader"
        >
          <i class="fa-solid fa-circle-notch animate-spin text-[4rem]"></i>
        </div>
        <div
          class="h-auto w-[750px] rounded-2xl border items-start items-center p-8 gap-8 bg-card hidden"
          id="userCard"
        ></div>
      </div>
      <div>
        <h1 class="text-white font-semibold text-2xl mb-4">
          Latest repos for srijanstack
        </h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4" id="repoContainer">

        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
